<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self';">
    <title>处理结果预览</title>
    <link rel="stylesheet" href="preview-window.css">
  </head>
  <body>
    <main class="preview-shell">
      <header class="preview-toolbar">
        <div class="preview-title-block">
          <strong id="previewTitle">处理结果预览</strong>
          <span id="previewMeta">正在载入…</span>
        </div>
        <div class="preview-toolbar-actions">
          <button id="diffToggle" class="compare-toggle is-hidden" type="button" title="查看质检差异热力图：红色区域为与原图的差异处">差异热力</button>
          <button id="compareToggle" class="compare-toggle is-hidden" type="button" title="与原图对比">对比原图</button>
          <div class="preview-zoom-controls" aria-label="预览缩放">
            <button id="zoomOut" type="button" title="缩小（⌘-）" aria-label="缩小">−</button>
            <button id="zoomReset" type="button" title="适合窗口（⌘0）"><span id="zoomValue">适合</span></button>
            <button id="zoomIn" type="button" title="放大（⌘+）" aria-label="放大">+</button>
          </div>
        </div>
      </header>
      <section id="previewStage" class="preview-stage">
        <span id="previewLoading" class="preview-loading">正在载入预览…</span>
        <div id="compareStack" class="compare-stack is-hidden">
          <img id="previewImage" alt="处理结果预览" draggable="false">
          <img id="sourceImage" class="compare-source is-hidden" alt="原图" draggable="false">
          <img id="heatmapImage" class="heatmap-overlay is-hidden" alt="质检差异热力图" draggable="false">
          <span class="compare-badge badge-source is-hidden">原图</span>
          <span class="compare-badge badge-result is-hidden">结果</span>
          <span id="diffBadge" class="compare-badge badge-diff is-hidden">差异热力</span>
          <div id="compareDivider" class="compare-divider is-hidden" title="拖动分割线对比"><span></span></div>
        </div>
        <div class="preview-help">⌘ + / − 缩放 · ⌘ 0 还原 · 放大后拖拽查看</div>
      </section>
    </main>
    <script src="i18n.js"></script>
    <script src="preview-window.js"></script>
  </body>
</html>
