<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self';">
    <title>水印清理工作台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div>
            <div class="eyebrow">WATERMARK LAB</div>
            <h1>水印清理工作台</h1>
          </div>
        </div>

        <div class="login-cluster">
          <div id="loginPill" class="status-pill is-offline">
            <span class="status-dot"></span>
            <span id="loginText">正在检查豆包状态</span>
          </div>
          <button id="loginButton" class="button secondary" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
            <span id="loginButtonText">登录豆包</span>
          </button>
          <button id="logoutButton" class="logout-button is-hidden" type="button">退出登录</button>
        </div>
      </header>

      <main class="workspace">
        <section class="queue-panel panel">
          <div class="panel-head">
            <div>
              <h2>处理队列</h2>
              <p>逐张上传，串行处理，避免对话结果错位</p>
            </div>
            <div class="queue-tools">
              <span id="queueCount" class="count-badge">0 张</span>
            </div>
          </div>

          <button id="dropZone" class="drop-zone" type="button">
            <span class="drop-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg>
            </span>
            <span class="drop-copy">
              <strong>拖入图片或文件夹，或点击选择</strong>
              <small>支持 JPG、PNG、WEBP、HEIC 等格式 · 文件夹内图片自动全部加入 · 单张不超过 80 MB</small>
            </span>
            <span class="select-chip">选择图片</span>
          </button>

          <div id="emptyState" class="empty-state">
            <div class="empty-grid" aria-hidden="true"></div>
            <p>等待添加原图</p>
            <span>处理进度与导出方式会显示在这里</span>
          </div>
          <div id="queueListToolbar" class="queue-list-toolbar is-hidden">
            <label class="select-all-control" title="全选 / 取消全选">
              <input id="selectAllCheckbox" type="checkbox" checked>
              <span>全选</span>
            </label>
            <button id="clearButton" class="text-button" type="button">清空</button>
            <label class="interval-control" title="每张图片处理完成后等待的秒数；多线程模式下由系统自动控制节奏">
              <span>任务间隔</span>
              <input id="intervalSeconds" type="number" min="0" max="600" step="1" value="30">
              <span>秒</span>
            </label>
            <label class="interval-control" title="豆包回复结束后，继续等待图片出现的秒数；超过后判定为未生成。图片出得慢、被误判“没有生成图片”时可调大">
              <span>无图等待</span>
              <input id="imageWaitSeconds" type="number" min="5" max="300" step="1" value="60">
              <span>秒</span>
            </label>
            <label class="parallel-control" title="开启后同时处理多张图片（并行数量见右侧「同时处理」）；若频繁触发安全验证请关闭或调低数量">
              <input id="parallelProcessing" type="checkbox">
              <span>多线程</span>
            </label>
            <label class="interval-control is-hidden" id="maxConcurrentControl" title="最多同时处理的任务数（1-8）；数量越大内存占用越高，也越容易触发安全验证">
              <span>同时处理</span>
              <input id="maxConcurrentTasks" type="number" min="1" max="8" step="1" value="3">
              <span>个</span>
            </label>
          </div>
          <div id="queueList" class="queue-list" aria-live="polite"></div>
        </section>

        <aside class="settings-panel panel">
          <div class="panel-head compact">
            <div>
              <h2>处理设置</h2>
              <p>使用已验证的稳定处理方案</p>
            </div>
          </div>

          <div class="settings-scroll simplified-settings">
            <div class="strategy-summary">
              <div class="strategy-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></svg>
              </div>
              <div>
                <strong>自动保持原图比例</strong>
                <span id="strategySummaryText">顶部添加 10% 临时隔离带，裁切补偿 0.5%。</span>
              </div>
              <button id="advancedSettingsButton" class="gear-button" type="button" title="高级设置" aria-label="打开高级设置">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10M18 7h2M4 12h3M11 12h9M4 17h8M16 17h4"/><circle cx="16" cy="7" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="14" cy="17" r="2"/></svg>
              </button>
            </div>

            <div class="setting-row switch-row debug-window-setting">
              <div>
                <strong>显示豆包处理窗口</strong>
                <span>关闭后在后台处理；安全验证时仍会临时显示</span>
              </div>
              <label class="switch">
                <input id="showBrowserWindow" type="checkbox">
                <span></span>
              </label>
            </div>

            <div class="appearance-card">
              <div class="appearance-title">
                <div>
                  <strong>界面外观</strong>
                  <span>选择深浅模式与玻璃色调</span>
                </div>
                <div class="appearance-popover-anchor">
                  <button id="appearanceToggle" class="gear-button appearance-toggle" type="button" title="展开颜色设置" aria-label="展开颜色设置" aria-expanded="false">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 1 0 9 9c0-1.2-.8-2-2-2h-1.5a2.5 2.5 0 0 1-2.5-2.5V6c0-1.8-1.2-3-3-3Z"/><circle cx="7.5" cy="11" r=".8"/><circle cx="10" cy="7.5" r=".8"/><circle cx="8.5" cy="15" r=".8"/></svg>
                  </button>
                  <div id="appearanceColors" class="appearance-popover is-hidden" aria-label="颜色设置">
                    <div id="paletteControl" class="palette-row" aria-label="界面调色盘">
                      <button type="button" data-palette="forest" title="森屿绿"><span></span></button>
                      <button type="button" data-palette="ocean" title="湖海蓝"><span></span></button>
                      <button type="button" data-palette="violet" title="暮光紫"><span></span></button>
                      <button type="button" data-palette="sunset" title="落日橙"><span></span></button>
                      <button type="button" data-palette="graphite" title="石墨灰"><span></span></button>
                    </div>
                    <div class="custom-color-row">
                      <span>自定义主题色</span>
                      <label id="customColorControl" class="custom-color-control" title="选择任意颜色">
                        <input id="themeColor" type="color" value="#246b55" aria-label="选择自定义主题色">
                        <span class="custom-color-preview" aria-hidden="true"></span>
                        <output id="themeColorValue">#246B55</output>
                      </label>
                    </div>
                  </div>
                </div>
              </div>
              <div id="themeModeControl" class="theme-segments" aria-label="界面明暗模式">
                <button type="button" data-theme-mode="auto">自动</button>
                <button type="button" data-theme-mode="light">浅色</button>
                <button type="button" data-theme-mode="dark">深色</button>
              </div>
            </div>

            <div class="setting-group output-group">
              <label class="field-label">输出目录</label>
              <button id="outputButton" class="path-button" type="button">
                <span id="outputPath">请选择文件夹</span>
                <em>更改</em>
              </button>
              <div class="output-hint">处理完成的图片会自动保存到这里</div>
            </div>
          </div>

          <div class="settings-actions">
            <button id="openOutputButton" class="button ghost" type="button">打开输出目录</button>
            <button id="exportZipButton" class="button ghost" type="button" title="勾选了已完成任务时只导出勾选项，否则导出全部已完成图片" disabled>导出 ZIP</button>
            <button id="cancelButton" class="button danger is-hidden" type="button">停止任务</button>
            <button id="startButton" class="button primary" type="button" disabled>
              <span class="button-label">开始批量处理</span>
              <span class="button-count" id="startCount">0</span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
            </button>
          </div>
        </aside>
      </main>
    </div>

    <div id="previewModal" class="preview-modal is-hidden" aria-hidden="true">
      <div id="previewBackdrop" class="preview-backdrop"></div>
      <section class="preview-dialog" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
        <header class="preview-head">
          <div>
            <strong id="previewTitle">处理结果预览</strong>
            <span id="previewMeta">正在载入…</span>
          </div>
          <div class="preview-head-actions">
            <div class="preview-zoom-controls" aria-label="预览缩放">
              <button id="previewZoomOut" type="button" title="缩小（⌘-）" aria-label="缩小">−</button>
              <button id="previewZoomReset" type="button" title="适合窗口（⌘0）"><span id="previewZoomValue">适合</span></button>
              <button id="previewZoomIn" type="button" title="放大（⌘+）" aria-label="放大">+</button>
            </div>
            <button id="previewClose" class="preview-close" type="button" aria-label="关闭预览">×</button>
          </div>
        </header>
        <div id="previewStage" class="preview-stage">
          <span id="previewLoading" class="preview-loading">正在载入预览…</span>
          <img id="previewImage" class="is-hidden" alt="处理结果预览" draggable="false">
          <div class="preview-help">⌘ + / − 缩放 · ⌘ 0 还原 · 放大后拖拽查看</div>
        </div>
      </section>
    </div>

    <div id="thumbPopover" class="thumb-popover is-hidden" aria-hidden="true">
      <img id="thumbPopoverImage" alt="原图放大预览" draggable="false">
    </div>
    <div id="toastRegion" class="toast-region" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
